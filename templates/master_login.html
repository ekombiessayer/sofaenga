<!DOCTYPE html>
<html lang="fr">
<head>
    <title>SOFAENGA</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 50%, #3b82f6 100%);
            font-family: 'Inter', sans-serif; min-height: 100vh; 
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .master-container { 
            background: rgba(255,255,255,0.15); backdrop-filter: blur(25px); 
            border-radius: 30px; padding: 60px 50px; width: 100%; max-width: 500px;
            box-shadow: 0 35px 70px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2);
            text-align: center; position: relative; overflow: hidden;
        }
        .master-logo { 
            width: 100px; height: 100px; background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border-radius: 25px; margin: 0 auto 30px; display: flex; align-items: center; 
            justify-content: center; font-size: 3rem; color: #1e293b; font-weight: 800; 
            box-shadow: 0 20px 40px rgba(251,191,36,0.4);
        }
        h1 { font-size: 2.8rem; font-weight: 800; margin-bottom: 20px; 
             background: linear-gradient(135deg, #fff, #f0f0f0); -webkit-background-clip: text;
             -webkit-text-fill-color: transparent; }
        .subtitle { color: rgba(255,255,255,0.95); font-size: 1.2rem; margin-bottom: 40px; }
        input[type="password"] { 
            width: 100%; padding: 22px 25px; border: 2px solid rgba(255,255,255,0.4);
            border-radius: 25px; background: rgba(255,255,255,0.1); color: white;
            font-size: 1.3rem; font-weight: 500; margin-bottom: 30px; backdrop-filter: blur(10px);
            transition: all 0.3s; text-align: center;
        }
        input[type="password"]:focus { 
            outline: none; border-color: #fbbf24; box-shadow: 0 0 0 4px rgba(251,191,36,0.3);
            background: rgba(255,255,255,0.2);
        }
        .master-btn { 
            width: 100%; padding: 25px; background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #1e293b; border: none; border-radius: 30px; font-size: 1.4rem; font-weight: 800;
            cursor: pointer; transition: all 0.4s; box-shadow: 0 20px 40px rgba(251,191,36,0.4);
            text-transform: uppercase; letter-spacing: 1px;
        }
        .master-btn:hover { transform: translateY(-3px); box-shadow: 0 30px 60px rgba(251,191,36,0.6); }
        .flash { padding: 15px 25px; margin: 20px 0; border-radius: 15px; font-weight: 600; }
        .flash.error { background: rgba(239,68,68,0.3); border-left: 5px solid #ef4444; color: white; }
    </style>
</head>
<body>
    <div class="master-container">
        <div class="master-logo"><i class="fas fa-shield-alt"></i></div>
                        
        <!-- Messages Flash -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST" action="/master_login">
            <input type="password" name="master_password" placeholder="Mot de passe" required autocomplete="off">
            <button type="submit" class="master-btn">
                <i class="fas fa-key mr-3"></i> OUVRIR BUREAU
            </button>
        </form>
        <p style="margin-top: 30px; opacity: 0.8;">
            <a href="/" style="color: rgba(255,255,255,0.8);">←public</a>
        </p>
    </div>
</body>
</html>
